<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Zhou Research Group — LSU</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WXYRSL3LQK"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-WXYRSL3LQK');
  </script>
</head>
<body data-page="Gallery">
  <div class="page-hero">
    <img src="images/gallery.jpg" alt="Lab gallery" class="hero-banner">
    <div class="hero-overlay">
      <h1>Gallery</h1>
      <p class="hero-sub">Photos from lab activities, field days, and events</p>
    </div>
  </div>

  <div class="content-section">

    <!-- ═══════ EVENT 1 ═══════ -->
    <div class="gallery-event fade-in">
      <div class="gallery-event-header">
        <h3>Sugarcane Field Day</h3>
        <span class="gallery-date">July 16, 2026</span>
      </div>
      <div class="gallery-carousel">
        <button class="carousel-btn carousel-prev" aria-label="Previous">&#8249;</button>
        <div class="carousel-track">
          <div class="carousel-slide">
            <img src="images/sugarcane.jpg" alt="Sugarcane Field Day">
          </div>
          <div class="carousel-slide">
            <div class="img-placeholder"><span class="placeholder-icon">📷</span><span class="placeholder-label">Add photo</span></div>
          </div>
          <div class="carousel-slide">
            <div class="img-placeholder"><span class="placeholder-icon">📷</span><span class="placeholder-label">Add photo</span></div>
          </div>
        </div>
        <button class="carousel-btn carousel-next" aria-label="Next">&#8250;</button>
        <div class="carousel-dots"></div>
      </div>
    </div>

    <!-- ═══════ EVENT 2 ═══════ -->
    <div class="gallery-event fade-in">
      <div class="gallery-event-header">
        <h3>Water Management Field Day</h3>
        <span class="gallery-date">July 9, 2025</span>
      </div>
      <div class="gallery-carousel">
        <button class="carousel-btn carousel-prev" aria-label="Previous">&#8249;</button>
        <div class="carousel-track">
          <div class="carousel-slide">
            <img src="images/water.jpg" alt="Water Management Field Day">
          </div>
          <div class="carousel-slide">
            <div class="img-placeholder"><span class="placeholder-icon">📷</span><span class="placeholder-label">Add photo</span></div>
          </div>
          <div class="carousel-slide">
            <div class="img-placeholder"><span class="placeholder-icon">📷</span><span class="placeholder-label">Add photo</span></div>
          </div>
        </div>
        <button class="carousel-btn carousel-next" aria-label="Next">&#8250;</button>
        <div class="carousel-dots"></div>
      </div>
    </div>

    <!--
      ✏️ TO ADD A NEW EVENT:
      Copy the block below, update the title, date, and image sources.
      Add as many <div class="carousel-slide"> items as you have photos.

      <div class="gallery-event fade-in">
        <div class="gallery-event-header">
          <h3>Event Name</h3>
          <span class="gallery-date">Month Day, Year</span>
        </div>
        <div class="gallery-carousel">
          <button class="carousel-btn carousel-prev" aria-label="Previous">&#8249;</button>
          <div class="carousel-track">
            <div class="carousel-slide"><img src="images/photo1.jpg" alt="Description"></div>
            <div class="carousel-slide"><img src="images/photo2.jpg" alt="Description"></div>
            <div class="carousel-slide"><img src="images/photo3.jpg" alt="Description"></div>
          </div>
          <button class="carousel-btn carousel-next" aria-label="Next">&#8250;</button>
          <div class="carousel-dots"></div>
        </div>
      </div>
    -->

  </div>

  <!-- Lightbox overlay -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <img src="" alt="" id="lightboxImg">
    <div class="lightbox-caption" id="lightboxCaption"></div>
  </div>

  <script src="site.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      /* ── Lightbox ── */
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxCaption = document.getElementById('lightboxCaption');
      const lightboxClose = document.getElementById('lightboxClose');

      document.querySelectorAll('.carousel-slide img').forEach(img => {
        img.style.cursor = 'pointer';
        img.addEventListener('click', (e) => {
          e.stopPropagation();
          lightboxImg.src = img.src;
          lightboxImg.alt = img.alt;
          const event = img.closest('.gallery-event');
          const caption = event ? event.querySelector('h3') : null;
          lightboxCaption.textContent = caption ? caption.textContent : '';
          lightbox.classList.add('active');
          document.body.style.overflow = 'hidden';
        });
      });
      lightboxClose.addEventListener('click', closeLB);
      lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLB(); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLB(); });
      function closeLB() { lightbox.classList.remove('active'); document.body.style.overflow = ''; }

      /* ── Carousel (mouse-drag + touch swipe) ── */
      document.querySelectorAll('.gallery-carousel').forEach(carousel => {
        const track = carousel.querySelector('.carousel-track');
        const slides = carousel.querySelectorAll('.carousel-slide');
        const prevBtn = carousel.querySelector('.carousel-prev');
        const nextBtn = carousel.querySelector('.carousel-next');
        const dotsWrap = carousel.querySelector('.carousel-dots');
        let cur = 0, startX = 0, dragging = false;

        slides.forEach((_, i) => {
          const dot = document.createElement('button');
          dot.classList.add('carousel-dot');
          if (i === 0) dot.classList.add('active');
          dot.addEventListener('click', () => go(i));
          dotsWrap.appendChild(dot);
        });

        function go(i) {
          cur = Math.max(0, Math.min(i, slides.length - 1));
          track.style.transform = `translateX(-${cur * 100}%)`;
          dotsWrap.querySelectorAll('.carousel-dot').forEach((d, j) => d.classList.toggle('active', j === cur));
        }
        prevBtn.addEventListener('click', () => go(cur - 1));
        nextBtn.addEventListener('click', () => go(cur + 1));

        track.addEventListener('mousedown', (e) => { startX = e.clientX; dragging = true; });
        track.addEventListener('mousemove', (e) => { if (dragging) e.preventDefault(); });
        track.addEventListener('mouseup', (e) => { if (!dragging) return; dragging = false; const d = startX - e.clientX; if (Math.abs(d) > 50) go(cur + (d > 0 ? 1 : -1)); });
        track.addEventListener('mouseleave', () => { dragging = false; });

        track.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; }, { passive: true });
        track.addEventListener('touchend', (e) => { const d = startX - e.changedTouches[0].clientX; if (Math.abs(d) > 50) go(cur + (d > 0 ? 1 : -1)); });
      });
    });
  </script>
</body>
</html>
